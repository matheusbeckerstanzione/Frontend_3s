<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Form</title>
    <link rel="stylesheet" href="../CSS/Styles.css">
</head>

<body>

    <header>
        <div class="container container--flex-column">
            <img class="header__logo" src="../Imagens/mdi_drivers-license-outline.svg" alt="Logo">
            <h1 class="header__title">Contact Form</h1>
            <p class="header__text">Insira os dados do contato e clique em cadastrar!</p>
        </div>
    </header>

    <main>
        <div class="container">
            <form action="" class="contact-form">

                <!--  -->
                <div class="contact-form__linha">

                    <div class="container-form__col-a">
                        <label class="contact-form__label" for="name">Nome:</label>
                    </div>

                    <!--  -->
                    <div class="container-form__col-b">
                        <input class="contact-form__input contact-form__input--metade" name="name" id="name"
                            placeholder="Nome" type="text">
                        <input class="contact-form__input contact-form__input--metade" name="sobrenome" id="sobrenome"
                            placeholder="Sobrenome" type="text">
                    </div>
                </div>

                <!--  -->
                <div class="contact-form__linha">

                    <div class="container-form__col-a">
                        <label class="contact-form__label" for="email">Email:</label>
                    </div>
                    <div class="container-form__col-b">
                        <input class="contact-form__input contact-form__input--inteira" name="email" id="email"
                            placeholder="Email" type="email">
                    </div>

                </div>

                <!--  -->
                <div class="contact-form__linha">

                    <div class="container-form__col-a">
                        <label class="contact-form__label" for="telefone">Telefone:</label>
                    </div>

                    <!--  -->
                    <div class="container-form__col-b">
                        <input class="contact-form__input contact-form__input--terco" name="telefone" id="telefone"
                            placeholder="+55" type="tel">
                        <input class="contact-form__input contact-form__input--terco" name="ddd" id="ddd"
                            placeholder="DDD" type="text">
                        <input class="contact-form__input contact-form__input--terco" name="numero" id="numero"
                            placeholder="ex:999999999" type="text">
                    </div>

                </div>

                <!--  -->
                <div class="contact-form__linha">

                    <div class="container-form__col-a">
                        <label class="contact-form__label" for="cep">Endereço:</label>
                    </div>

                    <!--  -->
                    <div class="container-form__col-b">
                        <input class="contact-form__input contact-form__input--cep" name="cep" id="cep"
                            onblur="EnderecoBuscado(this.value);" placeholder="CEP" type="text">
                        <input class="contact-form__input contact-form__input--rua" name="rua" id="rua"
                            placeholder="Rua" type="text">
                        <input class="contact-form__input contact-form__input--num" name="numero_end" id="numero_end"
                            placeholder="N" type="text">
                    </div>
                </div>

                <!--  -->
                <div class="contact-form__linha">

                    <div class="container-form__col-a"></div>

                    <div class="container-form__col-b">
                        <input class="contact-form__input contact-form__input--terco" name="complemento"
                            id="complemento" placeholder="Complemento" type="text">
                        <input class="contact-form__input contact-form__input--terco" name="bairro" id="bairro"
                            placeholder="Bairro" type="text">
                        <input class="contact-form__input contact-form__input--terco" name="cidade" id="cidade"
                            placeholder="Cidade" type="text">
                    </div>
                </div>

                <!--  -->
                <div class="contact-form__linha">

                    <div class="container-form__col-a"></div>

                    <div class="container-form__col-b">
                        <input class="contact-form__input contact-form__input--terco" name="estado" id="estado"
                            placeholder="Estado" type="text">
                    </div>
                </div>

                <!--  -->
                <div class="contact-form__linha">

                    <div class="container-form__col-a container-form__col-a--top">
                        <label class="contact-form__label" for="anotacoes">Anotações:</label>
                    </div>

                    <div class="container-form__col-b">
                        <textarea class="contact-form__input contact-form__input--textarea" name="anotacoes"
                            id="anotacoes" placeholder="Suas anotacoes aqui"></textarea>
                    </div>
                </div>

                <!--  -->
                <div class="contact-form__linha">

                    <div class="container-form__col-a"></div>

                    <div class="container-form__col-b button-container">
                        <button type="button" class="contact-form__button--medate"
                            onclick="validarFormulario();">Cadastrar</button>
                        <button type="reset" class="contact-form__button--medate">Limpar</button>
                    </div>

                </div>


            </form>
        </div>

    </main>

    <script src="../js/script.js"></script>

</body>

</html>
