<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elemento pelo ID</title>
</head>
<body>

        <input type="text" id="nome">
        <input type="text" id="sobrenome">
        <button onclick="juntarnome">Nome e Sobrenome</button>

        <script>
            function juntarnome(){
             const nome = window.document.getElementById("nome");
             let sobrenome = document.getElementById("sobrenome").val;

             //nome = "João";
             sobrenome = "Silva";

            console.log(nome);
            console.log(nome.value);
            console.log(nome.id);
            nome.value = "João";
            console.log(sobrenome);
        
            }
           
        
        </script>
</body>
</html>
